name: Scanner Trading 24/7

on:
  schedule:
    - cron: '30 14 * * 1-5'   # 8:30 AM MX
    - cron: '0 16 * * 1-5'    # 10:00 AM MX
    - cron: '30 19 * * 1-5'   # 1:30 PM MX
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Mostrar directorio actual
        run: pwd

      - name: Listar archivos en la raíz
        run: ls -la

      - name: Verificar contenido de scanner_24_7.py
        run: head -n 5 scanner_24_7.py
      - name: Restaurar caché de IA
        uses: actions/cache@v4
        with:
          path: cache_ia
          key: ${{ runner.os }}-ia-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ia-cache-

      - name: Restaurar historial de señales
        uses: actions/cache@v4
        with:
          path: historial_senales.csv
          key: historial-${{ github.run_id }}
          restore-keys: |
            historial-

      - name: Instalar dependencias
        run: pip install yfinance pandas numpy requests

      - name: Ejecutar scanner
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_REMITENTE:   ${{ secrets.EMAIL_REMITENTE }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          WHATSAPP_NUMERO:   ${{ secrets.WHATSAPP_NUMERO }}
          WHATSAPP_APIKEY:   ${{ secrets.WHATSAPP_APIKEY }}
        run: python scanner_24_7.py

      - name: Subir historial de señales como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: historial_senales
          path: historial_senales.csv
