name: Scanner 24/7

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Listar archivos (debug)
        run: |
          ls -la
          ls -la data/ || echo "data/ no existe"
      - name: Ejecutar scanner
        run: python scanner_24_7.py
        env:
          EMAIL_REMITENTE: ${{ secrets.EMAIL_REMITENTE }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          WHATSAPP_NUMERO: ${{ secrets.WHATSAPP_NUMERO }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GHU_GIST_TOKEN: ${{ secrets.GHU_GIST_TOKEN }}
